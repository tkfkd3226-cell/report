<title>준비서면 낭독용</title>
<style>
:root{--ink:#111827;--muted:#64748b;--line:#e2e8f0;--bg:#f1f5f9;--panel:#fff;--brand:#0f172a;--accent:#0f766e;--warn:#9a3412}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;background:var(--bg);color:var(--ink);line-height:1.75}
body.locked{overflow:hidden}.gate{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:18px;background:linear-gradient(135deg,#0f172a,#334155 60%,#0f766e)}.gate.hidden{display:none}.gate-card{width:min(410px,100%);background:#fff;border-radius:22px;padding:24px;box-shadow:0 24px 70px #0008}.gate-card h1{font-size:22px;margin:0 0 8px}.gate-card p{font-size:13px;color:var(--muted);margin:0 0 16px}.gate input,.gate button{width:100%;height:48px;border-radius:12px;font:inherit}.gate input{border:1px solid #cbd5e1;text-align:center;font-size:18px;font-weight:900;letter-spacing:.15em}.gate button{margin-top:9px;border:0;background:var(--brand);color:#fff;font-weight:900;cursor:pointer}.gate .err{min-height:20px;color:#dc2626;text-align:center;font-size:13px;font-weight:800;margin-top:7px}
header{background:linear-gradient(135deg,#0f172a,#334155);color:#fff;padding:28px 18px}.wrap{max-width:920px;margin:0 auto}header h1{margin:0;font-size:clamp(24px,5vw,38px);letter-spacing:-.04em}header p{margin:8px 0 0;color:#cbd5e1;font-size:14px}
.player{position:sticky;top:0;z-index:50;background:#ffffffee;backdrop-filter:blur(12px);border-bottom:1px solid var(--line);box-shadow:0 5px 18px #0f172a12}.player-inner{max-width:920px;margin:0 auto;padding:10px 14px;display:grid;gap:8px}.controls{display:flex;gap:7px;flex-wrap:wrap;align-items:center}.controls button,.controls select{border:1px solid #cbd5e1;background:#fff;color:#1e293b;border-radius:10px;padding:8px 11px;font-weight:900;font:inherit;cursor:pointer}.controls button.primary{background:var(--brand);color:#fff;border-color:var(--brand)}.controls button.stop{color:#b91c1c}.controls label{font-size:12px;color:var(--muted);font-weight:800}.progress{height:6px;background:#e2e8f0;border-radius:999px;overflow:hidden}.progress span{display:block;height:100%;width:0;background:var(--accent);transition:width .2s}.status{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
main{padding:18px 14px 60px}.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:20px;margin-bottom:14px;box-shadow:0 8px 24px #0f172a0b}.card h2{margin:0 0 12px;font-size:20px;letter-spacing:-.03em}.card h3{margin:0 0 10px;font-size:17px;color:#0f172a}.summary{border-left:5px solid var(--accent)}.warning{border-left:5px solid #f59e0b;background:#fffbeb}.warning h2{color:var(--warn)}.speech{margin:0 0 12px;text-align:justify;word-break:keep-all}.speech:last-child{margin-bottom:0}.speech.active{background:#fef08a;border-radius:6px;box-shadow:0 0 0 4px #fef08a;padding:0 2px}.bullets{display:grid;gap:8px}.bullet{padding-left:18px;position:relative}.bullet:before{content:"";position:absolute;left:2px;top:.8em;width:6px;height:6px;border-radius:50%;background:var(--accent)}
.tabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}.tabs button{border:1px solid #cbd5e1;background:#fff;border-radius:999px;padding:7px 10px;font-weight:900;cursor:pointer}.tabs button.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.evidence{width:100%;border-collapse:collapse;font-size:13px}.evidence th,.evidence td{border:1px solid var(--line);padding:8px;vertical-align:top}.evidence th{background:#334155;color:#fff;text-align:left}
footer{padding:24px 14px;text-align:center;color:var(--muted);font-size:12px}
@media(max-width:640px){header{padding-right:62px}.card{padding:16px;border-radius:14px}.controls{display:grid;grid-template-columns:repeat(3,1fr)}.controls button,.controls select{padding:8px 5px;font-size:12px}.controls label{grid-column:1/-1}.speech{text-align:left}.evidence{display:block;overflow:auto;white-space:nowrap}}
@media print{.gate,.player,.tabs{display:none!important}body{background:#fff}.card{box-shadow:none;break-inside:avoid}}
</style>

<header><div class="wrap"><h1 id="title">준비서면 낭독용</h1><p>전체 서면과 핵심 전략을 브라우저 음성으로 들을 수 있습니다.</p></div></header>
<div class="player"><div class="player-inner"><div class="controls"><button class="primary" id="play">▶ 듣기</button><button id="pause">⏸ 일시정지</button><button class="stop" id="stop">■ 정지</button><select id="mode"><option value="summary">핵심 전략</option><option value="full">전체 준비서면</option><option value="assumptions">작성 전제</option></select><select id="rate"><option value="0.8">0.8배</option><option value="0.9">0.9배</option><option value="1" selected>1.0배</option><option value="1.1">1.1배</option><option value="1.2">1.2배</option><option value="1.3">1.3배</option></select><select id="voice"><option value="">한국어 음성 자동</option></select></div><div class="progress"><span id="bar"></span></div><div class="status" id="status">준비됨. 듣기 버튼을 누르세요.</div></div></div>
<main class="wrap" id="content"></main>
<footer>검토용 예시 · 법원 제출 전 대리인 최종 검토 및 증거번호 대조 필요</footer>
<script>
const $=s=>document.querySelector(s); const DATA={"title":"2025가합14077 원고 준비서면 반박 예시","summary":["이 초안의 중심 논리는 네 가지입니다.","첫째, 임대차계약서에는 가맹명의 이전 조항이 없고, 계약 전부터 피고가 골프존과 계약하고 원고 측이 운영하는 구조가 논의되었습니다.","둘째, 2025년 8월 11일 무렵 주요 공사와 인허가가 끝났고, 8월 15일부터 예약, 라운드, 직원근무, 무료시타, 매출과 카드결제가 실제로 발생했습니다. 따라서 인도나 이행제공이 전혀 없었다는 주장은 설득력이 약합니다.","셋째, 원고가 보낸 6천만 원은 2억 7천만 원 잔금 전액이 아니라 계약에 없는 일부 중도금이었고, 나머지 금액에는 가맹명의 이전 등 조건이 붙었습니다. 피고는 8월 28일 남은 2억 1천만 원을 다시 최고했습니다.","넷째, 원고가 주장하는 손해는 피고의 실제 매출을 원고의 가상 이익으로 그대로 바꾼 것이어서 성립하기 어렵습니다. 원고가 부담할 월세, 부가세, 운영비, 조달비용, 세금과 초기 손실도 빠져 있습니다.","가장 중요한 위험지점은 8월 28일 내용증명의 추가 요구 문구와 8월 12일 명의이전 협의 내용입니다. 제출 전에는 원문을 다시 대조하여 잔금 최고가 독립적이었다는 점과 명의이전의 조건과 시기가 미확정이었다는 점을 더 명확히 정리해야 합니다."],"sections":[{"title":"I. 이 사건에서 실제로 판단되어야 할 사항","paragraphs":["원고의 2026. 7. 3.자 준비서면은 이 사건을 ‘피고가 공사를 마친 뒤 갑자기 직접 영업할 욕심으로 임대차계약을 파기하고, 원고에게 새로운 위탁운영계약을 강요한 사건’으로 구성하고 있습니다. 그러나 계약 체결 전 통화, 계약서 문언, 공사 및 운영 준비 과정, 원고 대표들의 당시 발언, 실제 라운드·매출자료를 시간순으로 놓고 보면 그와 같은 서술은 객관적 경위와 부합하지 않습니다.","피고는 이 사건 임대차계약의 존재를 부인하지 않습니다. 쟁점은 첫째, 임대차계약에 골프존 가맹점주 지위의 무조건적 이전의무가 포함되어 있었는지, 둘째, 2025. 8월 중순경 목적물이 임대차 목적에 따라 사용할 수 있는 상태로 제공되었는지, 셋째, 원고가 계약에 따른 잔금 전액을 무조건적으로 이행하거나 적법하게 제공하였는지, 넷째, 피고의 최고 및 해제가 유효한지에 있습니다.","이 사건의 객관적 흐름은 다음과 같습니다. 원고 측 박상준은 계약 체결 전부터 피고가 시설비를 부담하고 골프존과 가맹계약을 체결하되 원고 측이 운영을 담당하는 구조를 먼저 구체적으로 설명하였습니다. 이후 피고는 약 7억 6천만 원 규모의 인테리어 공사와 골프존 시설비를 부담하였고, 원고 측은 공사 주관·비품 반입·직원 면접·예약 처리·고객 응대·현장 운영에 관여하였습니다. 2025. 8. 11.경 주요 공사와 인허가가 마무리되었고, 8. 13. 실제 게임, 8. 15. 이후 예약·라운드·무료시타, 8. 21. 매출 및 카드결제가 확인됩니다. 그럼에도 원고는 잔금 2억 7천만 원 전액이 아니라 6천만 원만을 ‘중도금’이라며 일방 송금하고, 나머지 금액의 지급을 계약서에 없는 가맹명의 이전 등과 결부하였습니다.","따라서 원고의 청구는 계약의 문언과 당사자의 실제 이행 경위를 분리하여 볼 것이 아니라, 위와 같은 전체 경위 속에서 판단되어야 합니다."]},{"title":"II. 계약서 문언상 가맹명의 이전은 피고의 채무가 아닙니다","paragraphs":["이 사건 임대차계약서에는 보증금 3억 원, 계약금 3천만 원, 잔금 2억 7천만 원, 월차임 2천5백만 원이 명확히 기재되어 있습니다. 특약 제2항은 해당 목적물의 모든 시설, 인테리어 및 골프존 장비의 소유권이 피고에게 있고 원고는 이를 영업에 이용한다고 정합니다. 특약 제6항은 매출에서 피고가 지급한 비용을 차감한 후 원고가 지정한 계좌로 입금하도록 정하고 있습니다. 반면 계약서 어디에도 피고가 골프존 가맹계약 또는 가맹점주 지위를 원고에게 이전하여야 한다는 문구는 없습니다.","원고는 ‘골프존 매장을 운영하려면 원고가 가맹점주가 되어야 하므로 명의이전은 계약 목적상 당연히 포함된다’고 주장합니다. 그러나 당사자가 약 20억 원에 이르는 시설·장비 투자와 5년의 계약관계를 정하면서, 그 법률관계를 근본적으로 바꾸는 가맹점 운영권의 양도를 의도하였다면 그 대상, 시기, 대가, 골프존의 승인, 시설 및 장비의 귀속, 계약 종료 시 처리 등을 계약서에 기재하는 것이 자연스럽습니다. 그러한 핵심사항이 전혀 없는 상태에서 단지 영업 목적이 스크린골프장이라는 이유만으로 무조건적인 가맹명의 이전의무를 계약 내용에 추가할 수는 없습니다.","특약 제5항의 ‘영업활동에 소모되는 소모품 등은 원고가 해당 비용을 지불한다’는 문구도 마찬가지입니다. 이 조항은 피고 소유의 시설·인테리어·골프존 장비와 구별되는 식음료, 비품 및 영업 과정에서 소비되는 소모성 비용의 부담주체를 정한 것입니다. 이를 가맹계약의 모든 고정비용을 원고가 직접 부담하고, 나아가 원고가 가맹점주가 되어야 한다는 의미로 확대할 문언상 근거가 없습니다. 설령 일부 가맹 관련 비용을 원고가 최종적으로 정산하는 구조를 상정하더라도, 피고가 가맹점주로서 먼저 지급한 뒤 매출에서 공제·정산하는 방식이 충분히 가능합니다.","골프존 가맹계약서 제32조는 가맹점 운영권의 양도뿐 아니라 운영권의 대리행사, 위탁운영, 동업, 전전세 등 여러 운영형태를 가맹본부의 사전 통지 및 승인 대상으로 규정하고 있습니다. 이는 명의이전이 가능한 경우가 있다는 의미일 뿐, 임대차계약만으로 피고에게 양도의무가 발생한다는 의미가 아닙니다. 오히려 제3자인 골프존의 승인과 별도의 법률관계 정리가 필수임을 보여 줍니다.","결국 원고의 주장은 ‘양도가 가능하다’는 것과 ‘피고가 원고에게 양도할 계약상 의무가 있다’는 것을 혼동한 것입니다."]},{"title":"III. 위탁운영 구조는 공사 완료 후 피고가 갑자기 만든 조건이 아닙니다","paragraphs":["원고는 2025. 4. 22. 통화를 계약 전의 일반적 대화에 불과하다고 축소합니다. 그러나 그 통화는 이 사건 계약의 체결 경위와 당사자가 예정한 실제 운영구조를 가장 직접적으로 보여 주는 자료입니다.","당시 박상준은 자신이 과거 연습장을 운영한 방식에 관하여 시설과 권리에 대한 권리는 갖지 않고, 상당한 보증금과 월세를 지급하면서 운영하는 방식이라고 설명하였습니다. 이어 ‘그게 보통 위탁운영이라고 될 수도 있다’, ‘권리가 없다고 계약서에 명시하면 된다’, ‘원상복구와 제소 전 화해도 가능하다’는 취지로 구체적인 구조를 제안하였습니다. 이에 조명래가 ‘그러면 그렇게 합시다’라고 답하고 제안내용을 정리해 달라고 하였습니다.","특히 조명래가 ‘골프존과 계약은 내가 해야 되는 것이냐’고 묻자 박상준은 ‘하셔야 된다’고 답하였습니다. 조명래는 골프존과의 계약은 피고가 진행하고, 원고 측은 인테리어와 운영 준비를 담당하는 방식으로 정리하였습니다. 이는 피고 명의의 가맹계약과 원고 측의 운영 참여가 계약 체결 전부터 구체적으로 논의되었음을 의미합니다.","2025. 7. 21. 대화에서도 피고가 시스템·인테리어·가구 비용을 부담하고, 원고 측이 나머지 운영 비품을 준비하며, 인테리어와 운영 관련 실무를 주관한다는 역할분담이 재확인되었습니다. 2025. 8. 18. 조명래는 후속 계약서 초안이 나오면 전달하되, 마음에 걸리는 부분이 있으면 서명 전에 중단하여도 된다는 취지까지 명시하였습니다. 이러한 발언은 계약서 서명을 강요한 태도와 양립하기 어렵습니다.","피고의 주장은 이 사건 임대차계약 자체가 곧 위탁운영계약이라는 것이 아닙니다. 임대차계약과 별도로, 피고 명의의 가맹계약 아래 원고 측이 실제 운영을 담당하는 관계를 골프존 승인 및 자산보호 조건에 맞게 문서화할 필요가 있었다는 것입니다. 후속 운영계약서 작성 시도는 공사 완료 후의 변심이 아니라, 계약 체결 전부터 논의된 운영구조를 명확히 하려는 과정이었습니다."]},{"title":"IV. 2025. 8. 12. 및 8. 19. 대화도 무조건적인 명의이전 합의를 증명하지 않습니다","paragraphs":["원고는 2025. 8. 19. 대화 중 조명래가 ‘그렇게 해도 된다’고 말한 부분을 인용하여 명의이전 의무가 확정되었다고 주장합니다. 그러나 같은 대화에서 조명래는 명의이전이 원래 임대차계약의 내용이 아니고, 계약 체결 후 원고가 요청한 사항이라고 반복하여 설명하였습니다. 일부 발언만 떼어내어 볼 것이 아니라 대화 전체의 맥락을 보아야 합니다.","2025. 8. 12. 통화에서는 가맹명의 변경이 일반적인 양수도와 다른 구조이므로 자문변호사를 통한 별도 계약서가 필요하다고 명시적으로 논의되었습니다. 최종 계약서 공유, 원고 측의 의견, 명의이전 시점, 골프존과의 협의, 피고가 투자한 시설 및 장비의 보호방안이 모두 남아 있었습니다. 이는 당사자가 명의이전 가능성을 검토하고 협의하였음을 보여 줄 뿐, 구체적 내용과 이행시기가 확정된 무조건적 채무가 이미 성립하였음을 보여 주지 않습니다.","가맹점 운영권의 이전은 골프존의 승인이라는 제3자의 행위도 필요합니다. 또한 피고는 수억 원의 가맹 및 시설 비용을 부담하였고, 계약 종료 시 시설·장비의 반환과 운영권 회수 문제를 정리하여야 했습니다. 이러한 본질적 사항에 관한 합의와 서면이 완성되지 않은 상태에서 단순한 협의 발언만으로 즉시 이행할 수 있는 명의이전 채무가 발생하였다고 볼 수 없습니다.","설령 재판부가 계약 후 명의이전을 추진하기로 한 보충적 합의가 어느 정도 존재하였다고 보더라도, 그 합의는 적어도 별도 계약서의 확정, 피고 투자자산의 보호조건 정리, 골프존의 승인 및 이전시기의 확정을 전제로 한 것입니다. 원고가 잔금 전액을 지급하지 않은 상태에서 피고가 먼저 무조건적으로 가맹명의를 이전할 의무가 있었다고 볼 수 없습니다."]},{"title":"V. 가맹명의가 피고에게 있다는 이유로 원고 측의 프로그램 사용과 운영이 사실상 불가능했다는 주장은 객관자료와 모순됩니다","paragraphs":["원고는 가맹점주가 아니면 골프존 프로그램에 접속할 수 없어 예약과 영업 자체가 불가능하다고 단정합니다. 그러나 가맹계약상 법적 주체가 누구인지와, 해당 주체의 관리 아래 실제 운영자가 프로그램과 장비를 사용하여 매장을 운영할 수 있는지는 서로 다른 문제입니다.","조규철은 창릉프리미어점에 관여하기 전부터 삼송테크노스크린점의 운영비, 직원 근무현황, 현금매출, 골프존 홈페이지 매출, 급여 및 각종 비용을 정리하여 피고 측에 보고하였습니다. 2025. 5. 30.에는 골프존 교육을 마쳤다는 취지로 보고하였고, 2025. 7. 22.에는 조명래에게 골프존 비즈몰과 GPM 접속주소 및 점주용 시스템의 사용방법을 알려 주었습니다. 박상준도 2025. 8. 16. 통화에서 조규철이 기존 매장을 운영해 보았고 자신이 매출자료를 보여 주면서 운영방법을 가르쳤다는 취지로 말하였습니다.","창릉프리미어점에서도 2025. 8. 11.부터 조규철이 예약을 접수·정리하였고, 8. 14. 현장으로 출근하여 대응하였으며, 8. 15. 이후 직원 교육, 데스크 POS 업무, 룸 기계 점검, 방 배정 및 고객응대에 관여하였습니다. 8. 15.부터 8. 21.까지 실제 라운드 기록이 있고, 8. 21. GPM 당일매출과 카드결제 내역도 존재합니다. 양희정의 진술과 추가 진술서도 위와 같은 직접 목격 사실을 구체적으로 확인합니다.","따라서 원고의 ‘명의이전이 없었으므로 프로그램 사용과 운영 자체가 전혀 불가능하였다’는 주장은 실제 자료와 양립하지 않습니다. 피고는 승인 없는 운영이 적법하다고 주장하는 것이 아니라, 원고가 기술적·사실적 불가능을 전제로 피고의 인도 및 이행제공을 전면 부정하는 논리가 성립하지 않는다고 주장하는 것입니다."]},{"title":"VI. 2025. 8월 중순경 목적물은 임대차 목적에 따라 사용할 수 있는 상태였고, 원고 측은 실제 운영에 관여하였습니다","paragraphs":["인테리어공사 계약서상 준공일은 2025. 8. 11.입니다. 2025. 8. 7. 대화에서 골프존 장비는 양타방을 제외하고 설치가 완료되었고 실제로 게임을 시험해 보겠다는 말이 나왔습니다. 8. 11.에는 소방필증과 전기안전필증 발급 및 인허가 완료가 확인되었습니다. 공사완료확인서, 인테리어 업체 진술서 및 공사대금 이체내역도 주요 공사가 완료되었고 남은 작업은 자동문, 유리, 조명, 가구 등 일부 마무리·보수 수준이었다는 점을 뒷받침합니다.","실제 사용 정황은 더욱 명확합니다. 2025. 8. 13. 조명래가 현장에서 스크린을 이용한 뒤 방에 자동차 열쇠를 두고 왔다고 대화하였습니다. 8. 11. 및 8. 12.에는 8. 15. 예약을 조규철에게 전달하고 조규철이 이를 정리하였습니다. 8. 14.에는 조규철이 현장에 가고 있다고 답하였고, 8. 16.에는 손님 방문과 무료 응대, 다음 날 현장 근무가 논의되었습니다. 8. 16. 밴드 무료시타 공지와 8. 18. 행사 후기, 8. 15.부터 8. 21.까지의 라운드자료, 8. 21. 매출 및 카드결제자료가 서로 일치합니다.","원고는 이를 피고 측 지인의 무료게임에 불과하다고 주장합니다. 그러나 일부 무료 이용이나 지인 이용이 포함되었다 하더라도, 예약 접수, 방 배정, 직원 출근, 고객 응대, 무료시타 행사, 다수의 라운드, 유료매출과 카드결제가 실제로 발생하였다는 사실은 변하지 않습니다. 이는 적어도 목적물이 스크린골프 영업에 사용할 수 있는 상태였고, 원고 측이 이를 알고 실제 운영행위에 관여하였음을 보여 줍니다.","원고가 제출한 비품구입 목록도 원고 측이 단순히 외부에서 공사를 지켜본 것이 아니라 커피머신 등 영업비품을 구입·반입하고 점포의 운영개시를 준비하였음을 스스로 확인합니다. 정수기 명의변경을 후속 내용증명으로 요구한 사실도 원고가 현장 설비를 자신의 운영대상으로 인식하였음을 보여 줍니다.","민법 제460조에 의하면 채무의 이행은 채무내용에 좇아 현실로 제공하여야 하나, 채권자의 수령행위가 필요한 경우에는 이행준비의 완료를 알리고 수령을 최고하는 방식으로도 제공할 수 있습니다. 민법 제536조의 동시이행항변권도 상대방이 자신의 채무이행을 제공할 때까지만 인정됩니다. 이 사건에서는 원고 측이 목적물의 상태를 누구보다 잘 알고 직접 공사·예약·직원·영업준비에 관여하였고, 실제 운영까지 이루어졌습니다. 별도의 형식적 준공통지나 열쇠 교부만을 떼어내어 피고의 이행제공이 전혀 없었다고 할 수 없습니다.","보안카드, 열쇠 또는 지문등록의 형식도 인도 여부를 판단하는 하나의 사정일 뿐 유일한 기준은 아닙니다. 보안업체의 객관적 회신과 대화기록은 원고 측의 반복적인 출입 및 현장 이용 경위를 확인합니다. 설령 배타적 점유의 최종 이전이 완료되지 않았다고 보더라도, 피고가 사용 가능한 상태로 목적물을 준비하고 원고가 이를 인수·사용할 수 있도록 제공하였다는 점은 충분히 인정됩니다."]},{"title":"VII. 원고의 2025. 8. 16. 당시 발언은 원고의 현재 주장과 정면으로 배치됩니다","paragraphs":["원고는 2025. 8. 16. 통화를 단지 박상준의 건강 문제로 업무를 조규철에게 맡기는 내용이라고 주장합니다. 피고도 그 통화만으로 원고 법인이 임대차계약을 확정적으로 포기하였다고 단정할 필요는 없다고 봅니다. 그러나 그 통화는 원고가 당시 목적물의 운영 가능성과 실제 영업상황을 어떻게 인식하고 있었는지를 보여 주는 중요한 자료입니다.","박상준은 당시 ‘장사가 너무 잘될 것 같다’, ‘손님들도 오고 너무 잘 된다’, 조규철이 ‘혼자 할 수 있다’고 하였다는 취지로 말하였습니다. 또한 김은주가 계약서 때문에 마음이 달라진 것인지 묻자, 박상준은 계약서 문제 때문이 아니며 ‘월세만 잘 내면 아무 문제없는 계약서’라고 조규철에게 설명하였다는 취지로 답하였습니다.","2025. 8. 16. 당시 원고 대표가 영업이 불가능한 미완성 현장이라고 인식하였다면 ‘손님들이 오고 장사가 잘된다’, ‘조규철에게 맡길 수 있다’, ‘월세만 잘 내면 된다’는 대화를 할 이유가 없습니다. 이 통화는 원고의 현재 주장처럼 가맹명의 미이전 때문에 영업 자체가 불가능했다거나, 목적물이 전혀 인도되지 않았다는 설명과 정면으로 모순됩니다.","다만 피고는 위 통화를 원고의 계약 포기라는 하나의 결론으로 과장하지 않습니다. 이는 박상준의 참여 철회로 원고 측의 운영주체와 이행계획이 변경되고 불안정해졌다는 점, 그리고 그와 동시에 목적물에서는 실제 영업이 가능한 상태가 형성되어 있었다는 점을 입증하는 자료입니다."]},{"title":"VIII. 양희정의 법적 고용주가 누구인지는 조규철의 실제 운영 관여를 부정하지 못합니다","paragraphs":["원고는 양희정이 피고에 의해 채용된 근로자이므로 조규철이 매장을 운영하였다는 근거가 될 수 없다고 주장합니다. 그러나 이 쟁점에서 중요한 것은 4대보험 신고나 임금지급 명의가 아니라, 누가 양희정을 면접하고 출근하게 하였으며 현장에서 누가 어떤 업무를 지시·교육하고 고객을 응대하였는지입니다.","양희정은 조규철과 면접한 후 2025. 8. 15. 출근하였고, 조규철이 약 일주일간 현장에 출근·상주하면서 직원 교육, 데스크 POS 업무, 룸 기계 에러 점검, 인테리어 미흡부분 확인, 청소 및 손님 응대에 관여하였다는 취지로 진술하였습니다. 원고도 조규철이 양희정을 면접한 사실은 인정합니다. 대화기록에서도 조규철이 예약을 처리하고 현장에 출근하겠다고 답한 사실이 확인됩니다.","따라서 최종적인 근로계약의 명의가 피고였다는 사정은 조규철의 실질적인 현장 운영 관여를 소멸시키지 않습니다. 피고는 노동관계의 사용자성을 이 사건 쟁점으로 확대하는 것이 아니라, 원고 측이 목적물의 운영에 실제로 참여하지 않았다는 원고의 주장이 사실과 다르다는 점을 지적하는 것입니다."]},{"title":"IX. 잔금 지급기일은 임의로 기재된 날짜가 아니며, 적어도 2025. 8월 중순 이후에는 지급의무가 확정되었습니다","paragraphs":["계약서에는 잔금 2억 7천만 원을 2025. 5. 1. 지급한다고 명시되어 있습니다. 계약서 어디에도 인테리어 완료일까지 잔금 지급기일을 유예한다거나, 실제 인도일에 다시 정한다는 약정이 없습니다. 원고가 주장하는 ‘임의로 날짜를 기재하였다’는 설명은 계약서의 명확한 문언을 당사자 일방의 사후 주장만으로 무력화하는 것입니다.","피고가 2025. 5월과 6월에 즉시 독촉하지 않았다는 사정도 지급기일 변경의 합의를 의미하지 않습니다. 채권자가 일정 기간 지급을 기다려 준 것과 계약상 변제기를 변경하기로 의사합치한 것은 전혀 다른 문제입니다. 그러한 변경합의를 뒷받침하는 서면이나 명확한 대화는 없습니다.","특약 제8항은 인테리어 기간 중 ‘월세’를 받지 않는다고 정하였을 뿐입니다. 보증금 잔금의 지급의무까지 유예한다는 문구는 없습니다. 오히려 계약이 이미 성립하고 인테리어 기간이 존재함을 전제로 그 기간의 차임만 면제한 조항입니다.","다만 피고는 재판부가 잔금 지급과 목적물 제공을 동시이행관계로 보거나 2025. 5. 1.의 문언을 그대로 적용하지 않을 가능성에 대비하여 예비적으로 주장합니다. 앞서 본 바와 같이 2025. 8. 11.경 주요 공사와 인허가가 완료되고, 8. 13. 실제 장비 사용, 8. 15. 이후 예약·라운드·고객응대, 8. 21. 매출 및 카드결제가 이루어졌으므로, 늦어도 2025. 8. 15. 또는 8. 21.에는 원고의 잔금 지급의무가 이행기에 도달하였습니다."]},{"title":"X. 6천만 원의 일방 송금은 잔금 전액의 적법한 이행 또는 이행제공이 아닙니다","paragraphs":["이 사건 계약의 지급구조는 계약금 3천만 원과 잔금 2억 7천만 원입니다. 별도의 중도금 약정은 없습니다. 그럼에도 원고는 2025. 8. 19. 협의 없이 6천만 원만을 송금하면서 이를 ‘중도금’이라고 표현하였고, 나머지 잔금은 공사가 완료되고 정상적인 영업이 가능해지는 시점에 지급하겠다는 조건을 붙였습니다.","민법 제460조의 이행제공은 채무내용에 좇아 이루어져야 합니다. 잔금 전액이 아니라 일부만 지급하고, 나머지 금액의 지급을 계약서에 없는 조건과 결부한 행위는 잔금채무 전액의 이행이나 적법한 제공이 아닙니다. 2025. 8. 29. 잔고증명서 역시 특정 시점의 계좌잔액을 보여 줄 뿐, 잔금 전액을 무조건적으로 현실제공하거나 수령을 최고한 자료가 아닙니다.","피고가 6천만 원의 송금에 이의를 제기한 것은 잔금 전액을 받지 않겠다는 의사가 아니라, 계약상 예정되지 않은 일부금 지급방식과 그에 부가된 조건을 받아들이지 않겠다는 의사였습니다. 실제로 피고는 2025. 8. 28. 원고에게 이미 송금된 6천만 원을 제외한 잔금 2억 1천만 원과 지연손해금의 지급을 2025. 9. 5.까지 요구하였습니다. 이는 피고에게 잔금을 받을 의사가 없었다는 원고 주장과 정반대입니다.","이후 계약해제 이후에도 피고는 반환계좌를 요청하였으나 원고가 계약이 유효하다는 이유로 계좌를 제공하지 않았고, 피고는 6천만 원 전액을 공탁하였습니다. 이는 금원을 임의로 보유하거나 원고의 지급을 방해하려는 태도가 아니라, 계약 종료에 따른 반환관계를 정리하려는 조치였습니다. 민법 제487조도 채권자가 변제를 받지 않는 경우 변제공탁을 예정하고 있습니다."]},{"title":"XI. 피고의 최종 해제 주장은 2025. 8. 22. 문자 하나에만 근거한 것이 아닙니다","paragraphs":["원고는 2025. 8. 22. 문자 당시 사전 최고가 없었다는 이유로 피고의 해제가 전부 무효라고 주장합니다. 그러나 피고가 이 소송에서 주장하는 최종적인 해제의 법률구성은 8. 22. 문자만으로 완성되는 것이 아닙니다.","8. 22. 문자가 즉시 해제의 확정적 의사표시로서 요건을 갖추지 못하였다고 가정하더라도, 피고는 2025. 8. 28.자 내용증명으로 원고에게 2025. 9. 5.까지 잔금 2억 1천만 원 및 지연손해금의 지급과 계약관계의 이행을 명시적으로 최고하였습니다. 원고도 위 최고 사실 자체는 인정합니다. 원고가 그 기한까지 잔금 전액을 지급하지 않음에 따라 피고는 2025. 9. 6. 계약이 해제되었음을 주장하고, 9. 8. 이를 확정적으로 통지하였습니다.","민법 제544조는 채무자가 채무를 이행하지 않을 때 상당한 기간을 정하여 이행을 최고하고 그 기간 내 이행하지 않으면 계약을 해제할 수 있다고 정합니다. 이 사건에서는 8. 28.부터 9. 5.까지의 구체적 기간이 부여되었고, 원고는 그 기간 내 계약상 잔금을 지급하지 않았습니다.","원고는 8. 28. 내용증명에 목적물 현황 확인 후 재인수 및 운영위탁계약서 체결 요구가 함께 기재되었으므로 최고 전체가 무효라고 주장합니다. 그러나 잔금 2억 1천만 원 및 지연손해금의 지급 요구는 금액과 기한이 독립적으로 특정되어 있습니다. 재인수 요구는 원고가 한편으로는 이미 현장에 출입하여 운영 준비와 가오픈에 관여하면서도 다른 한편으로는 인도를 받지 않았다고 주장하였기 때문에 목적물의 상태와 인수관계를 명확히 하려는 것이었습니다. 운영계약서 요구 역시 2025. 4. 22.부터 논의된 운영구조와 골프존 승인문제를 문서화하려는 것이었습니다.","피고가 운영계약서가 체결되지 않으면 적법하게 제공되는 잔금 전액조차 수령하지 않겠다는 의사를 명백히 표시한 사실은 없습니다. 오히려 8. 28. 내용증명은 잔금의 지급을 별도로 요구하였고, 원고는 그 요구에 응하지 않은 채 계약서에 없는 가맹명의 이전을 건물 인도 및 잔금 지급의 조건으로 계속 내세웠습니다. 따라서 운영관계에 관한 추가 요구의 법적 강제력이 일부 부정되더라도, 잔금 지급 최고까지 당연히 무효가 된다고 볼 수 없습니다.","예비적으로, 원고는 2025. 8. 29. 이후에도 피고가 가맹점주 지위를 먼저 이전하지 않는 한 잔금 전액을 지급하지 않겠다는 태도를 반복하였습니다. 가맹명의 이전이 이 사건 임대차계약상 피고의 선이행채무가 아니라면, 이는 계약상 잔금채무를 이행하지 않겠다는 의사표시입니다. 민법 제544조 단서에 의하면 채무자가 미리 이행하지 않을 의사를 표시한 경우에는 별도의 최고를 요하지 않습니다."]},{"title":"XII. 원고가 계약을 포기하지 않았다는 주장만으로 피고의 해제와 원고의 채무불이행이 부정되는 것은 아닙니다","paragraphs":["원고는 법인 자체가 계약을 포기한 적이 없다고 주장합니다. 그러나 피고가 반드시 원고의 명시적인 ‘포기’를 입증하여야만 계약해제를 주장할 수 있는 것은 아닙니다. 이 사건의 핵심은 원고가 계약상 잔금을 기한 내 지급하였는지, 그리고 계약서에 없는 가맹명의 이전을 지급조건으로 부가하였는지입니다.","2025. 8. 16. 통화는 박상준이 건강상 이유로 당초 예정한 공동운영에서 빠지고 조규철에게 전면적으로 맡기려 하였으며, 이에 피고 측이 운영안정성에 우려를 제기한 경위를 보여 줍니다. 피고가 약 20억 원 상당의 자산과 시설을 투자한 상황에서 실제 운영책임자와 계약관계를 명확히 하려 한 것은 합리적인 사업상 조치였습니다.","따라서 원고가 추상적으로 계약 유지 의사를 표시하였다는 사정만으로, 잔금 미지급과 조건부 이행, 운영주체 변경에 따른 계약관계 불안정이 해소되는 것은 아닙니다."]},{"title":"XIII. 피고에게 채무불이행 손해배상책임이 없고, 원고의 손해액 산식도 성립하지 않습니다","paragraphs":["민법 제390조에 따른 손해배상책임은 피고가 채무의 내용에 좇은 이행을 하지 않았다는 점이 먼저 인정되어야 합니다. 그러나 피고는 계약서에 없는 가맹명의 이전의무를 부담하지 않고, 목적물을 사용 가능한 상태로 제공하였으며, 원고의 잔금 미지급을 이유로 적법한 최고와 해제를 하였습니다. 그러므로 피고의 채무불이행을 전제로 한 손해배상청구는 출발점부터 성립하지 않습니다.","설령 피고의 일부 이행지체 가능성을 가정하더라도, 원고는 자신이 실제로 영업을 개시할 준비와 능력을 갖추고 있었고 피고의 행위 때문에 구체적인 이익을 얻지 못하였다는 점을 입증하여야 합니다. 원고는 잔금 전액을 지급하지 않았고, 가맹명의 이전과 별도 계약조건이 해결되지 않으면 잔금을 지급하지 않겠다는 태도를 보였습니다. 운영책임자인 박상준의 참여계획도 8. 16. 변경되었습니다. 단순한 잔고증명과 일부 비품 구입만으로 장기간의 영업이익이 확실히 발생하였다고 볼 수 없습니다.","원고는 자신의 손해를 ‘2025. 9. 1.부터 변론종결일까지 피고의 실제 매출에서 피고가 지출한 비용을 공제한 금액’으로 산정하겠다고 합니다. 그러나 피고가 실제로 달성한 매출과 원고가 운영하였다면 얻었을 가상의 이익은 동일하지 않습니다. 운영자의 경험, 영업전략, 인력구성, 자금투입, 광고, 신용, 고객관리 및 운영기간이 모두 다르기 때문입니다.","더구나 원고의 산식은 원고가 부담하였어야 할 월차임 2천5백만 원 및 부가가치세, 2027. 5. 1. 이후의 차임 인상분, 보증금 조달비용, 인건비, 관리비, 가맹수수료, 카드수수료, 세금, 보험료, 소모품비, 광고비, 감가상각 및 초기 영업손실 등을 완전하게 반영하지 않습니다. 피고의 비용구조를 그대로 원고에게 대입할 수도 없습니다.","민법 제393조에 따라 손해배상은 통상의 손해를 한도로 하고, 특별한 사정으로 인한 손해는 채무자가 이를 알았거나 알 수 있었을 때에만 인정됩니다. 원고가 주장하는 장기간의 가상 영업이익은 실제 발생 가능성, 인과관계 및 액수에 관하여 엄격한 증명이 필요합니다. 피고의 매출자료를 확보하는 것만으로 그 증명이 완성되지 않습니다.","원고가 건물인도라는 본래 이행을 계속 청구하면서 변론종결일까지의 영업이익을 함께 청구하는 것이 법률상 언제나 불가능한 것은 아니더라도, 동일 기간과 동일 경제적 이익에 대한 중복보상이 발생하지 않도록 엄격히 제한되어야 합니다. 특히 원고가 실제 이행 준비를 갖추지 못하였거나 잔금을 지급하지 않은 기간의 이익까지 피고에게 전가할 수는 없습니다.","골프존에 대한 사실조회 및 피고에 대한 문서제출명령도 원고 손해의 존재와 인과관계가 먼저 소명된 범위에서 필요한 자료로 한정되어야 합니다. 채택되는 경우에도 대상 기간, 계정과목 및 자료범위를 구체적으로 제한하고, 피고의 영업비밀과 고객·직원 개인정보는 마스킹하거나 비공개 열람 등의 방식으로 보호할 필요가 있습니다."]},{"title":"XIV. 원고 준비서면의 각 주장에 대한 결론","paragraphs":["첫째, 이 사건 임대차계약과 별도의 운영구조는 계약 체결 전부터 원고 측이 구체적으로 제안하고 피고 명의의 가맹계약을 전제로 논의한 것입니다. 피고가 공사 완료 후 갑자기 위탁운영을 강요하였다는 주장은 2025. 4. 22. 통화 및 이후 역할분담과 모순됩니다.","둘째, 가맹점주 지위의 이전은 임대차계약서에 없는 사항이고, 계약 후에도 별도 계약, 이전시기, 골프존 승인 및 투자자산 보호조건이 확정되지 않은 협의 단계였습니다. 가맹계약서 제32조상 양도가 가능하다는 사정은 피고의 양도의무를 발생시키지 않습니다.","셋째, 2025. 8월 중순경 주요 공사와 인허가가 완료되고 실제 예약, 직원 출근, 고객응대, 라운드와 매출이 발생하였습니다. 원고 측 조규철도 현장에서 운영에 관여하였습니다. 원고의 ‘인도나 이행제공이 전혀 없었다’는 주장은 형식적 열쇠·카드 교부만을 강조한 것으로 실제 경위와 맞지 않습니다.","넷째, 원고가 송금한 6천만 원은 계약에 없는 중도금이자 잔금의 일부에 불과하고, 나머지 잔금 지급에는 조건이 붙었습니다. 잔고증명서도 잔금 전액의 적법한 현실제공이 아닙니다.","다섯째, 피고의 최종 해제는 8. 22. 문자 하나가 아니라 8. 28. 최고와 9. 5.까지의 불이행, 그 후의 해제 통지에 기초합니다. 원고는 최고기간 내 잔금 전액을 지급하지 않았고, 오히려 계약에 없는 가맹명의 이전을 계속 지급조건으로 내세웠습니다.","여섯째, 피고의 채무불이행을 전제로 한 손해배상책임은 인정될 수 없고, 피고의 실제 영업이익을 곧바로 원고의 가상 영업이익으로 보는 산식도 법률상·회계상 성립하지 않습니다."]},{"title":"XV. 결론","paragraphs":["이 사건 자료를 전체적으로 보면, 원고는 피고가 막대한 시설비를 부담하고 원고 측이 실제 운영을 담당하는 구조를 인식한 상태에서 계약을 체결하고 공사 및 운영 준비에 깊이 관여하였습니다. 목적물이 실제 영업 가능한 상태가 되고 원고 측이 가오픈과 운영에 관여한 뒤에도, 원고는 잔금 전액을 지급하지 않은 채 계약서에 없는 가맹명의 이전을 선행조건으로 요구하였습니다.","피고는 원고의 일방적인 일부금 송금에도 불구하고 2025. 8. 28. 잔금 지급을 위한 최종 기회를 부여하였으나 원고는 이를 이행하지 않았습니다. 피고의 계약해제는 적법하고, 원고의 건물인도 청구 및 이를 전제로 한 손해배상 주장은 모두 이유 없습니다.","따라서 원고의 청구는 기각되어야 합니다."]}],"assumptions":["이 문서는 법원 제출 전 대리인 검토를 위한 예시 초안입니다. 증거번호, 제출일자, 당사자 표시와 각 증거의 정확한 문구를 최종 대조해야 합니다.","추가 확보 예정자료는 다음 취지로 확보된 것을 전제로 하였습니다: 공사완료확인서 및 인테리어 업체 진술서가 2025. 8. 11.경 주요 공사와 인허가가 완료되고 잔여 공사가 영업을 방해하지 않는 마무리·보수 수준이었다는 점을 확인하는 내용, 보안업체 회신이 원고 측의 현장 출입 및 접근 경위를 객관적으로 확인하는 내용, 양희정 추가 진술서가 조규철의 현장 상주·직원 교육·POS·룸 배정·기계 점검·고객 응대 등 직접 목격 사실을 구체적으로 확인하는 내용입니다.","피고의 골프존 가맹계약 관련 대금 및 인테리어 공사대금 이체내역은 피고가 창릉프리미어점과 삼송테크노스크린점의 가맹 관련 비용 및 시설 투자비를 실제 부담하였다는 취지로 확보된 것을 전제로 하였습니다.","2025. 8. 28.자 내용증명 원문은 반드시 다시 대조해야 합니다. 본 초안은 잔금 및 지연손해금 지급 요구가 독립적으로 특정되었고, 재인수·운영계약 관련 요구는 목적물 인수 및 운영관계를 정상화하기 위한 병렬적 요구라는 피고의 해석을 전제로 구성하였습니다.","골프존 시스템 관련 주장은 ‘승인 없이 타인이 운영하여도 적법하다’는 취지가 아닙니다. 원고의 ‘가맹명의 이전이 없으면 프로그램의 사실상 사용과 매장 운영 자체가 전혀 불가능하다’는 단정이 실제 운영 정황과 모순된다는 한도에서만 사용하였습니다."],"evidence":[["갑 제1호증","2025. 4. 26. 임대차계약서","보증금·차임·시설 소유권·비용 정산 및 가맹명의 이전조항 부재"],["갑 제15호증","원고의 2025. 7.~8. 비품구입 목록","원고 측의 영업 준비와 현장 사용 관여"],["갑 제16호증","2025. 8. 19. 대화녹취록","명의이전이 원계약 내용이 아니었고 별도 조건 협의 중이었던 경위"],["갑 제17호증","2025. 8. 19. 통화녹취록","6천만 원이 협의 없는 일부금·중도금으로 송금된 경위"],["갑 제18호증","6천만 원 이체확인증","잔금 전액이 아닌 일부금 송금 사실"],["을 제4호증","2025. 4. 22. 박상준·조명래 통화녹취록","피고 명의 가맹계약과 원고 측 운영 구조의 사전 논의"],["을 제5호증","2025. 7. 25. 창릉프리미어점 골프존 가맹계약서","가맹계약 구조와 제32조의 복수 운영형태 및 승인 필요"],["을 제7, 8호증","2025. 8. 16. 통화녹음 및 녹취록","실제 영업 가능 상태, 손님 방문, 운영주체 변경 경위"],["을 제11호증","6천만 원 변제공탁 관련 자료","반환계좌 미제공 후 전액 공탁 경위"],["을 제12호증(가번호)","지축골프존방 및 인테리어 단체대화 기록","공사·인허가·예약·현장출근·고객응대·시스템 정보 제공"],["을 제13호증(가번호)","양희정 진술서 및 추가 진술서","조규철의 면접·현장상주·직원교육·POS·룸 점검·고객응대"],["을 제14호증의 1~4(가번호)","2025. 8. 15.~21. GPM 라운드, 8. 21. 매출 및 카드결제 자료","가오픈, 실제 라운드, 유료매출과 결제 발생"],["을 제15호증의 1, 2(가번호)","2025. 8. 16. 무료시타 공지 및 8. 18. 행사 후기","고객 대상 운영행위 및 영업 가능 상태"],["을 제16호증의 1~4(가번호)","인테리어공사계약서, 공사완료확인서, 업체 진술서, 공사대금 이체내역","2025. 8. 11.경 주요 공사·인허가 완료와 피고의 비용 부담"],["을 제17호증의 1, 2(가번호)","삼송테크노스크린점 가맹계약서 및 관련 대금 이체내역","피고 명의 가맹계약과 조규철의 기존 운영 경험"],["을 제18호증(가번호)","창릉프리미어점 가맹 관련 전체 대금 이체내역","피고의 가맹·시설 비용 부담"],["을 제19호증(가번호)","2025. 8. 12. 통화녹취록","명의이전 관련 별도 계약·법률검토·시기·승인 미확정"],["을 제20호증(가번호)","CCTV·보안업체 사실조회 회신","원고 측 현장 출입과 접근 경위"]]}; let queue=[], idx=0, speaking=false, paused=false, voices=[];
function esc(s){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function render(){
 $('#title').textContent=DATA.title;
 let h='<div class="tabs"><button class="active" data-jump="summary-card">핵심 전략</button><button data-jump="brief-start">전체 서면</button><button data-jump="assumption-card">작성 전제</button><button data-jump="evidence-card">증거목록</button></div>';
 h+='<section class="card summary" id="summary-card"><h2>핵심 전략 요약</h2><div class="bullets">'+DATA.summary.map((x,i)=>`<p class="bullet speech" data-kind="summary" data-order="${i}">${esc(x)}</p>`).join('')+'</div></section>';
 h+='<section class="card warning" id="assumption-card"><h2>작성 전제 · 제출 전 삭제</h2>'+DATA.assumptions.map((x,i)=>`<p class="speech" data-kind="assumptions" data-order="${i}">${esc(x)}</p>`).join('')+'</section>';
 DATA.sections.forEach((s,si)=>{h+=`<section class="card" ${si===0?'id="brief-start"':''}><h3>${esc(s.title)}</h3>`+s.paragraphs.map((x,pi)=>`<p class="speech" data-kind="full" data-order="${si*100+pi}">${esc(x)}</p>`).join('')+'</section>'});
 h+='<section class="card" id="evidence-card"><h2>입증방법(가번호)</h2><table class="evidence"><thead><tr><th>증거번호</th><th>자료명</th><th>입증취지</th></tr></thead><tbody>'+DATA.evidence.map(r=>`<tr><td>${esc(r[0])}</td><td>${esc(r[1])}</td><td>${esc(r[2])}</td></tr>`).join('')+'</tbody></table></section>';
 $('#content').innerHTML=h; document.querySelectorAll('[data-jump]').forEach(b=>b.onclick=()=>document.getElementById(b.dataset.jump).scrollIntoView({behavior:'smooth'}));
}
function loadVoices(){voices=speechSynthesis.getVoices();const sel=$('#voice');sel.innerHTML='<option value="">한국어 음성 자동</option>';voices.filter(v=>v.lang&&v.lang.toLowerCase().startsWith('ko')).forEach(v=>{const o=document.createElement('option');o.value=v.name;o.textContent=v.name+' ('+v.lang+')';sel.appendChild(o)});}
speechSynthesis.onvoiceschanged=loadVoices;
function makeQueue(){const mode=$('#mode').value;queue=[...document.querySelectorAll(`.speech[data-kind="${mode}"]`)];idx=0;}
function clearActive(){document.querySelectorAll('.speech.active').forEach(x=>x.classList.remove('active'))}
function update(){const total=queue.length||1;$('#bar').style.width=Math.min(100,(idx/total)*100)+'%';$('#status').textContent=speaking?`낭독 중 ${Math.min(idx+1,total)} / ${total}`:'준비됨';}
function speakNext(){if(!speaking||idx>=queue.length){speaking=false;clearActive();$('#bar').style.width='100%';$('#status').textContent='낭독이 끝났습니다.';return}clearActive();const el=queue[idx];el.classList.add('active');el.scrollIntoView({behavior:'smooth',block:'center'});const u=new SpeechSynthesisUtterance(el.textContent.trim());u.lang='ko-KR';u.rate=parseFloat($('#rate').value);const chosen=$('#voice').value;const v=voices.find(x=>x.name===chosen)||voices.find(x=>x.lang&&x.lang.toLowerCase().startsWith('ko'));if(v)u.voice=v;u.onend=()=>{idx++;update();speakNext()};u.onerror=e=>{if(e.error!=='canceled'){idx++;speakNext()}};update();speechSynthesis.speak(u)}
$('#play').onclick=()=>{if(!DATA)return;if(paused){speechSynthesis.resume();paused=false;speaking=true;$('#status').textContent='낭독을 계속합니다.';return}speechSynthesis.cancel();makeQueue();speaking=true;paused=false;speakNext()};
$('#pause').onclick=()=>{if(speechSynthesis.speaking){speechSynthesis.pause();paused=true;speaking=false;$('#status').textContent='일시정지됨'}};
$('#stop').onclick=()=>{speechSynthesis.cancel();speaking=false;paused=false;idx=0;clearActive();$('#bar').style.width='0';$('#status').textContent='정지됨'};
$('#mode').onchange=()=>$('#stop').click();
render();loadVoices();$('#status').textContent='준비됨. 듣기 버튼을 누르세요.';
</script>
</body></html>
