const views=document.getElementById('views');
const titleEl=document.getElementById('currentTitle');
const loaded=new Set();
function decodeBase64Utf8(b64){const bytes=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));return new TextDecoder('utf-8').decode(bytes)}
ADMIN_PAGES.forEach(p=>{
 const section=document.createElement('section');section.className='admin-view';section.dataset.page=p.id;
 section.innerHTML='<div class="admin-loading">페이지를 불러오는 중입니다.</div>';
 views.appendChild(section);
});
function loadPage(id){
 const p=ADMIN_PAGES.find(x=>x.id===id);if(!p||loaded.has(id))return;
 const section=document.querySelector('.admin-view[data-page="'+id+'"]');
 const iframe=document.createElement('iframe');iframe.className='admin-frame';iframe.title=p.id+'. '+p.title;iframe.loading='eager';
 iframe.srcdoc=decodeBase64Utf8(p.data);section.replaceChildren(iframe);loaded.add(id);
}
function activate(id,push=true){
 if(!ADMIN_PAGES.some(p=>p.id===id))id=1;loadPage(id);
 document.querySelectorAll('.admin-view').forEach(v=>v.classList.toggle('active',Number(v.dataset.page)===id));
 document.querySelectorAll('.admin-nav-btn').forEach(b=>b.classList.toggle('active',Number(b.dataset.page)===id));
 const p=ADMIN_PAGES.find(x=>x.id===id);titleEl.textContent=p.id+'. '+p.title;document.title=p.id+'. '+p.title+' | 관리 대시보드';
 if(push)history.replaceState(null,'','#page-'+id);window.scrollTo({top:0,behavior:'auto'});
}
document.querySelectorAll('.admin-nav-btn').forEach(b=>b.addEventListener('click',()=>activate(Number(b.dataset.page))));
window.addEventListener('message',e=>{if(!e.data||e.data.type!=='admin-frame-height')return;const id=Number(e.data.page),h=Math.max(400,Math.min(Number(e.data.height)||800,100000));const f=document.querySelector('.admin-view[data-page="'+id+'"] iframe');if(f)f.style.height=h+'px'});
window.addEventListener('hashchange',()=>activate(Number((location.hash.match(/page-(\d+)/)||[])[1]||1),false));
activate(Number((location.hash.match(/page-(\d+)/)||[])[1]||1),false);
</script>
